
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Eid Ul Adha Qurbani Display</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
        }

        /* Vivid Rainbow Color Cycle System */
        body {
            color: #fff;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, 
                #ff0055, #ff7700, #ffdd00, #00ff66, #00ffff, #0022ff, #7700ff, #ff0055
            );
            background-size: 800% 800%;
            animation: rainbowThemeCycle 20s linear infinite;
        }

        @keyframes rainbowThemeCycle {
            0% { background-position: 0% 50%; }
            100% { background-position: 800% 50%; }
        }

        /* Ambient Dark Overlay to keep text and elements readable */
        .color-overlay {
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 15, 0.45);
            z-index: 1;
            pointer-events: none;
        }

        /* Twinkling Star Elements */
        .stars-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: starPulse 4s infinite ease-in-out;
        }
        @keyframes starPulse {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.2); box-shadow: 0 0 10px #fff; }
        }

        /* Luxury Hanging Traditional Lanterns */
        .lanterns-container {
            position: absolute;
            top: 0;
            inset-x: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 0 10%;
        }

        .lantern-chain {
            position: relative;
            width: 2px;
            background: linear-gradient(to bottom, transparent, #ffffff);
            transform-origin: top center;
            animation: gentleSway var(--sway-time) infinite ease-in-out alternate;
        }

        .lc-1 { height: 28vh; --sway-time: 5s; }
        .lc-2 { height: 18vh; --sway-time: 6.5s; margin-left: 40px; }
        .lc-3 { height: 22vh; --sway-time: 5.8s; margin-right: 40px; }
        .lc-4 { height: 32vh; --sway-time: 4.8s; }

        .lantern-housing {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 46px;
            height: 65px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffffff;
            border-radius: 12px 12px 20px 20px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lantern-housing::before {
            content: '';
            position: absolute;
            top: -10px;
            width: 32px;
            height: 10px;
            background: #ffffff;
            border-radius: 50% 50% 0 0;
        }

        .lantern-flame {
            width: 14px;
            height: 22px;
            background: #fff;
            border-radius: 50% 50% 35% 35%;
            box-shadow: 0 0 25px 8px #ffaa00, 0 0 10px #ffea00;
            animation: flameVibe 0.2s infinite alternate;
        }

        @keyframes gentleSway {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2deg); }
        }

        @keyframes flameVibe {
            0% { transform: scale(0.95) rotate(-1deg); opacity: 0.9; }
            100% { transform: scale(1.05) rotate(1deg); opacity: 1; }
        }

        /* Central Presentation Content Grid */
        .display-centerpiece {
            text-align: center;
            z-index: 4;
            width: 100%;
            max-width: 95%;
        }

        /* Premium Digital Clock Element */
        .live-clock {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 55px;
            font-weight: 300;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 0 4px 10px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 76px;
            font-weight: 400;
            letter-spacing: 5px;
            color: #ffffff;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.5), 0 4px 15px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }

        .sub-tagline {
            font-size: 26px;
            color: #ffffff;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.95;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
        }

        /* Walking Livestock Theater Track */
        .walking-track {
            position: relative;
            width: 100%;
            height: 120px;
            margin-top: 10px;
            overflow: hidden;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .animal-caravan {
            position: absolute;
            white-space: nowrap;
            display: flex;
            gap: 40px;
            bottom: 10px;
            /* Animation moves whole group from right off-screen to left off-screen */
            animation: caravanWalk 25s linear infinite;
        }

        .emoji-animal {
            font-size: 65px;
            display: inline-block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
            transform-origin: bottom center;
            /* Stepping/bobbing animation to look like it's walking */
            animation: animalStep 0.6s ease-in-out infinite alternate;
        }

        /* Offset stepping delays so they look natural and not completely synchronized */
        .a1 { animation-delay: 0.0s; }
        .a2 { animation-delay: 0.15s; }
        .a3 { animation-delay: 0.3s; }
        .a4 { animation-delay: 0.08s; }
        .a5 { animation-delay: 0.22s; }

        @keyframes caravanWalk {
            0% {
                transform: translateX(100vw);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        @keyframes animalStep {
            0% {
                transform: translateY(0) rotate(-3deg);
            }
            100% {
                transform: translateY(-8px) rotate(3deg);
            }
        }
    </style>
</head>
<body>

    <div class="color-overlay"></div>

    <div class="stars-canvas">
        <div class="star" style="top: 12%; left: 8%; width: 2px; height: 2px; animation-delay: 0.5s;"></div>
        <div class="star" style="top: 22%; left: 28%; width: 3px; height: 3px; animation-delay: 1.2s;"></div>
        <div class="star" style="top: 15%; left: 68%; width: 2px; height: 2px; animation-delay: 2s;"></div>
        <div class="star" style="top: 38%; left: 92%; width: 3px; height: 3px; animation-delay: 0.2s;"></div>
        <div class="star" style="top: 72%; left: 14%; width: 2px; height: 2px; animation-delay: 1.8s;"></div>
        <div class="star" style="top: 82%; left: 48%; width: 3px; height: 3px; animation-delay: 2.5s;"></div>
        <div class="star" style="top: 64%; left: 78%; width: 2px; height: 2px; animation-delay: 0.9s;"></div>
    </div>

    <div class="lanterns-container">
        <div style="display: flex;">
            <div class="lantern-chain lc-1"><div class="lantern-housing"><div class="lantern-flame"></div></div></div>
            <div class="lantern-chain lc-2"><div class="lantern-housing"><div class="lantern-flame"></div></div></div>
        </div>
        <div style="display: flex;">
            <div class="lantern-chain lc-3"><div class="lantern-housing"><div class="lantern-flame"></div></div></div>
            <div class="lantern-chain lc-4"><div class="lantern-housing"><div class="lantern-flame"></div></div></div>
        </div>
    </div>

    <div class="display-centerpiece">
        <div class="live-clock" id="screenClock">00:00:00 PM</div>
        
        <h1>Eid Ul Adha</h1>
        <div class="sub-tagline">Mubarak</div>

        <div class="walking-track">
            <div class="animal-caravan">
                <span class="emoji-animal a1">🐪</span> <span class="emoji-animal a2">🐄</span> <span class="emoji-animal a3">🐐</span> <span class="emoji-animal a4">🐑</span> <span class="emoji-animal a5">🐏</span> </div>
        </div>
    </div>

    <script>
        function updateScreenTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12;
            const hoursStr = String(hours).padStart(2, '0');

            document.getElementById('screenClock').innerText = `${hoursStr}:${minutes}:${seconds} ${ampm}`;
        }

        updateScreenTime();
        setInterval(updateScreenTime, 1000);
    </script>
</body>
</html>
